<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shri's Playground</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #1a1a2e;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 40px;
            background: #16213e;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #5867e8;
        }
        h1 { color: #5867e8; margin-bottom: 10px; }
        p { font-style: italic; color: #9da4d0; line-height: 1.6; }
        .experience-list {
            margin-top: 30px;
            text-align: left;
            list-style: none;
            padding: 0;
        }
        .experience-item {
            background: #0f3460;
            margin: 10px 0;
            padding: 15px;
            border-radius: 10px;
            transition: transform 0.2s;
            border: 1px solid transparent;
        }
        .experience-item:hover {
            transform: scale(1.03);
            border-color: #5867e8;
        }
        a {
            text-decoration: none;
            color: #e94560;
            font-weight: bold;
            display: block;
        }
        .tag {
            font-size: 10px;
            background: #5867e8;
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            vertical-align: middle;
            margin-left: 10px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🦇 Shri's Playground</h1>
    <p>"Welcome to Shri's playground. These are not battle tested ideas but just part of the bat cave playground."</p>
    
    <ul class="experience-list">
        <li class="experience-item">
            <a href="./disputes-demo/">Guided Workflow 2.0 (Disputes) <span class="tag">Active Prototype</span></a>
        </li>
        <li class="experience-item" style="opacity: 0.5;">
            <a href="#">Payments Experience <span class="tag" style="background:#666;">Coming Soon</span></a>
        </li>
    </ul>
</div>

</body>
</html>
